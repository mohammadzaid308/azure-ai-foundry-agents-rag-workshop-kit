# Frankie's Bakery support workflow (CSDL).
# One trigger (OnConversationStart) fans the conversation through the three
# bakery support agents in order: intake -> specialist -> synthesizer. Because
# they share the conversation, each agent sees the previous agent's output.
#
# Deploying this as a workflow agent makes the workflow itself show up in the
# Foundry portal (Agents / Workflows), not just the individual agents.
kind: Workflow
trigger:
  kind: OnConversationStart
  id: bakery_support_workflow
  actions:
    - kind: InvokeAzureAgent
      id: invoke_intake
      displayName: Intake
      conversationId: =System.ConversationId
      agent:
        name: bakery-intake
    - kind: InvokeAzureAgent
      id: invoke_specialist
      displayName: Specialist
      conversationId: =System.ConversationId
      agent:
        name: bakery-specialist
    - kind: InvokeAzureAgent
      id: invoke_synthesizer
      displayName: Customer reply
      conversationId: =System.ConversationId
      agent:
        name: bakery-synthesizer
